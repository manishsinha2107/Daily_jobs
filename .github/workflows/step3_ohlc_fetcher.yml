name: 📈 Step 3 - Smart OHLC Fetcher (Fyers)

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OHLC Fetcher
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_ID: ${{ secrets.FYERS_SECRET_ID }}
          FYERS_USERNAME: ${{ secrets.FYERS_USERNAME }}
          FYERS_PIN: ${{ secrets.FYERS_PIN }}
          FYERS_TOTP_KEY: ${{ secrets.FYERS_TOTP_KEY }}
        run: python -u scripts/3_smart_ohlc_fetcher.py
