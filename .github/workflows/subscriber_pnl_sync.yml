name: Subscriber PnL Sync

on:

  workflow_dispatch:
    # Allows manual triggering from the Actions tab

jobs:
  sync-pnl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright supabase python-dotenv
          playwright install chromium --with-deps

      - name: Execute Subscriber PnL Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TT_USER_EMAIL: ${{ secrets.TT_USER_EMAIL }}
          TT_USER_PASSWORD: ${{ secrets.TT_USER_PASSWORD }}
        run: |
          python scripts/subscriber_sync.py
