name: 🔑 Daily Data Pipeline

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger_pipeline]

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added fyers-apiv3 for the new Step 3 logic
          pip install pandas numpy supabase google-auth openpyxl requests python-dotenv pyotp pytz websocket-client fyers-apiv3

      - name: Run Sequence
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          # New Fyers Authentication Secrets
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_ID: ${{ secrets.FYERS_SECRET_ID }}
          FYERS_USERNAME: ${{ secrets.FYERS_USERNAME }}
          FYERS_PIN: ${{ secrets.FYERS_PIN }}
          FYERS_TOTP_KEY: ${{ secrets.FYERS_TOTP_KEY }}
          SOURCE_FOLDER: ${{ secrets.SOURCE_FOLDER }}
          DEST_FOLDER: ${{ secrets.DEST_FOLDER }}
        run: |
          echo "🚀 Step 0: Trade Ingestor"
          python -u scripts/0_trade_ingestor.py

          echo "🚀 Step 1: Broker Tokens"
          python -u scripts/1_update_broker_token.py

          echo "🚀 Step 2: Trade Verification"
          python -u scripts/2_update_strategy_trades_verification.py

          echo "🚀 Step 3: OHLC Fetcher (Self-Healing Fyers)"
          python -u scripts/3_smart_ohlc_fetcher.py

          echo "🚀 Step 4: PnL Closing (1-Min)"
          python -u scripts/4_pnl_processor_1min_closing.py

          echo "🚀 Step 5: PnL OHLC (High-Fi)"
          python -u scripts/5_pnl_processor_1min_ohlc.py

          echo "✅ FULL PIPELINE COMPLETED SUCCESSFULLY!"
