name: 🔍 Validate Fyers Format

on:
  workflow_dispatch:

jobs:
  validate-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Fyers Validation Script
        run: python scripts/validate_fyers_format.py
